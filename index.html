<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌟Inspiration🌟</title>
    <style>
        .course-teacher,
        .course-room-credit {
            font-size: 11px;
            color: #9CA3AF;
            font-weight: normal;
            line-height: 1.4;
}
        .course-teacher {
            margin-top: 6px;
}
        .course-room-credit {
            margin-top: 2px;
}
        *{margin:0;padding:0;box-sizing:border-box;font-family:"PingFang SC","Microsoft YaHei",Inter,sans-serif}
        :root {
            --primary: #E6F7F2;       
            --primary-dark: #52B788; 
            --success: #34D399;      
            --warning: #FBBF24;       
            --purple: #A78BFA;        
            --danger: #F87171;        
            --gray: #4B5563;          
            --light-gray: #F9FAFB;
            --border-color: #E5E7EB;
            --bg-img: url('https://p11-flow-imagex-download-sign.byteimg.com/tos-cn-i-a9rns2rl98/48848370d3e741028d374212eccab22d.png~tplv-a9rns2rl98-24:720:720.png');
        }
        body{
            background-color:#FCFCFD;
            padding:24px;
            background-image:var(--bg-img);
            background-size:180px;
            background-position:center 80px;
            background-repeat:no-repeat;
            background-attachment:fixed;
            opacity:0.98;
            min-height:100vh;
            overflow-x: hidden;
        }
        .container{
            max-width:1400px;
            width: 100%;
            margin:0 auto;
            background:rgba(255,255,255,.92);
            border-radius:20px;
            box-shadow:0 8px 32px rgba(0,0,0,.06);
            padding:28px;
            backdrop-filter:blur(10px);
        }
        .header{
            text-align:center;
            margin-bottom:28px;
            color:var(--primary-dark);
            display:flex;
            align-items:center;
            justify-content:center;
            gap:12px;
        }
        .header h1{
            font-size:28px;
            font-weight:700;
            letter-spacing:1px;
        }
        .header-logo{
            width:44px;
            height:44px;
            background-image:var(--bg-img);
            background-size:100% 100%;
            background-repeat:no-repeat;
            border-radius:12px;
        }
        
        .tab-bar{
            display:flex;
            gap:12px;
            margin-bottom:28px;
            justify-content:center;
            flex-wrap:wrap;
        }
        .tab-btn{
            padding:12px 28px;
            border:none;
            border-radius:12px;
            background:var(--light-gray);
            color:var(--gray);
            cursor:pointer;
            font-size:16px;
            font-weight:600;
            transition:all 0.3s ease;
            border:1px solid transparent;
        }
        .tab-btn.active{
            background:var(--primary);
            color:var(--primary-dark);
            border:1px solid var(--primary-dark);
            transform:translateY(-2px);
            box-shadow:0 4px 12px rgba(82,183,136,0.15);
        }
        .tab-btn:hover:not(.active){
            background:#F3F4F6;
            transform:translateY(-1px);
        }
        
        .panel{display:none}
        .panel.active{display:block}
        
        .main{
            display:flex;
            gap:24px;
            flex-wrap:wrap;
            align-items:stretch;
        }
        .calendar,.todo-panel{
            flex:1;
            min-width:360px;
            border:1px solid var(--border-color);
            border-radius:16px;
            padding:20px;
            background:rgba(255,255,255,.98);
            display:flex;
            flex-direction:column;
            box-shadow:0 2px 12px rgba(0,0,0,.04);
            transition:all 0.3s ease;
        }
        .calendar:hover,.todo-panel:hover{
            box-shadow:0 4px 20px rgba(0,0,0,.06);
        }
        .calendar-header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:20px;
        }
        .calendar-header h3{
            font-size:20px;
            color:var(--gray);
            font-weight:600;
        }
        .calendar-header button{
            padding:8px 14px;
            background:var(--primary);
            color:var(--primary-dark);
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-weight:500;
            transition:all 0.2s ease;
        }
        .calendar-header button:hover{
            background:var(--primary-dark);
            color:white;
        }
        .calendar-week{
            display:grid;
            grid-template-columns:repeat(7,1fr);
            text-align:center;
            font-weight:600;
            color:#9CA3AF;
            margin-bottom:12px;
            font-size:14px;
        }
        .calendar-days{
            display:grid;
            grid-template-columns:repeat(7,1fr);
            gap:6px;
            flex:1;
            grid-auto-rows:1fr;
        }
        .day{
            width:100%;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:flex-start;
            border-radius:10px;
            cursor:pointer;
            transition:all 0.2s ease;
            font-size:14px;
            padding:10px 4px;
            overflow:hidden;
            position:relative;
            height:100%;
            background:white;
        }
        .day.holiday{
            color: var(--danger) !important;
            font-weight: 700 !important;
        }
        .holiday-name{
            font-size:9px;
            color:var(--danger);
            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
            width:100%;
            text-align:center;
            margin-top:2px;
        }
        .day-number{
            margin-bottom:6px;
            height:22px;
            line-height:22px;
            font-weight:500;
        }
        .day-tags{
            margin-top:auto;
            width:100%;
            display:flex;
            flex-direction:column;
            gap:2px;
        }
        .day:hover{
            background:var(--primary);
            transform:scale(0.96);
        }
        .day.active{
            background:var(--primary-dark);
            color:white!important;
            font-weight:600;
            box-shadow:0 2px 8px rgba(82,183,136,0.2);
        }
        .day.has-todo::after{
            content:'';
            width:6px;
            height:6px;
            background:var(--danger);
            border-radius:50%;
            position:absolute;
            top:6px;
            right:8px;
        }
        .day-todo-title{
            line-height:1.2;
            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
            width:100%;
            text-align:center;
            font-size:10px;
        }
        .day.todo-count-1 .day-todo-title{font-size:13px!important;font-weight:700}
        .day.todo-count-2 .day-todo-title{font-size:12px!important;font-weight:500}
        .todo-title-class{color:var(--primary-dark)}
        .todo-title-homework{color:var(--success)}
        .todo-title-exam{color:var(--warning)}
        .todo-title-meeting{color:var(--purple)}
        .todo-title-other{color:var(--gray)}
        .todo-panel{position:relative}
        .todo-panel::before{
            content:'';
            position:absolute;
            bottom:24px;
            right:24px;
            width:90px;
            height:90px;
            background-image:var(--bg-img);
            background-size:100% 100%;
            opacity:.1;
        }
        .selected-date{
            font-size:20px;
            font-weight:600;
            color:var(--gray);
            margin-bottom:20px;
            text-align:center;
            padding-left:28px;
            background-image:var(--bg-img);
            background-repeat:no-repeat;
            background-position:left center;
            background-size:20px;
        }
        .add-form{
            display:flex;
            flex-direction:column;
            gap:12px;
            margin-bottom:24px;
        }
        .add-form input,.add-form textarea,.add-form select{
            padding:12px;
            border:1px solid var(--border-color);
            border-radius:10px;
            resize:vertical;
            font-size:14px;
            transition:all 0.2s ease;
            background:white;
        }
        .add-form input:focus,.add-form textarea:focus,.add-form select:focus{
            outline:none;
            border-color:var(--primary-dark);
            box-shadow:0 0 0 3px rgba(82,183,136,0.1);
        }
        .add-btn{
            padding:12px;
            background:var(--success);
            color:white;
            border:none;
            border-radius:10px;
            cursor:pointer;
            font-weight:600;
            transition:all 0.2s ease;
            font-size:15px;
        }
        .add-btn:hover{
            background:#22C55E;
            transform:translateY(-1px);
            box-shadow:0 4px 12px rgba(34,197,94,0.2);
        }
        .todo-list{
            flex:1;
            overflow-y:auto;
            position:relative;
            z-index:1;
            padding-right:8px;
        }
        .todo-list::-webkit-scrollbar{width:6px}
        .todo-list::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:3px}
        .todo-item{
            padding:14px;
            border-left:4px solid var(--primary-dark);
            background:var(--light-gray);
            margin-bottom:10px;
            border-radius:10px;
            cursor:pointer;
            transition:all 0.2s ease;
        }
        .todo-item:hover{
            transform:translateX(4px);
            box-shadow:0 2px 8px rgba(0,0,0,.06);
        }
        .todo-title{
            font-weight:600;
            display:flex;
            align-items:center;
            margin-bottom:8px;
            gap:8px;
            flex-wrap:wrap;
            font-size:15px;
        }
        .todo-type{
            display:inline-block;
            padding:4px 10px;
            font-size:11px;
            border-radius:12px;
            color:white;
            margin-right:8px;
            font-weight:500;
        }
        .type-class { background: var(--primary-dark); }
        .type-homework { background: var(--success); }
        .type-exam { background: var(--warning); }
        .type-meeting { background: var(--purple); }
        .type-other { background: var(--gray); }
        
        .modal-overlay{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,.2);
            z-index:998;
            display:none;
            backdrop-filter:blur(4px);
        }
        .modal-overlay.active{display:block}
        
        .detail-modal,.edit-modal{
            position:fixed;
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
            background:white;
            padding:28px;
            border-radius:16px;
            box-shadow:0 10px 40px rgba(0,0,0,.12);
            z-index:999;
            width:90%;
            max-width:600px;
            max-height:90vh;
            min-width:320px;
            min-height:220px;
            display:none;
            cursor:move;
            user-select: none;
            -webkit-user-select: none;
            resize: both;
            overflow: auto;
            border:1px solid var(--border-color);
        }
        .edit-modal input,.edit-modal select,.edit-modal textarea{
            user-select: text;
            -webkit-user-select: text;
        }
        .detail-modal.active,.edit-modal.active{display:block}
        .detail-header{
            font-size:20px;
            font-weight:600;
            color:var(--primary-dark);
            margin-bottom:20px;
            padding-bottom:12px;
            border-bottom:1px solid var(--border-color);
            text-align:left;
        }
        .detail-body{
            font-size:15px;
            line-height:1.7;
            color:var(--gray);
            overflow-y:auto;
            margin-bottom:24px;
            white-space:pre-wrap;
        }
        .detail-footer{
            text-align:right;
            display:flex;
            gap:12px;
            justify-content:flex-end;
        }
        .close-detail-btn,.detail-edit-btn,.detail-del-btn{
            border:none;
            padding:10px 18px;
            border-radius:10px;
            cursor:pointer;
            font-size:14px;
            color:white;
            font-weight:500;
            transition:all 0.2s ease;
        }
        .detail-edit-btn{background:var(--warning)}
        .detail-del-btn{background:var(--danger)}
        .close-detail-btn{background:var(--gray)}
        .close-detail-btn:hover,.detail-edit-btn:hover,.detail-del-btn:hover{
            transform:translateY(-1px);
            opacity:0.9;
        }
        .edit-form{
            display:flex;
            flex-direction:column;
            gap:14px;
        }
        .edit-form input,.edit-modal textarea,.edit-form select{
            padding:12px;
            border:1px solid var(--border-color);
            border-radius:10px;
            font-size:14px;
            transition:all 0.2s ease;
        }
        .edit-form input:focus,.edit-modal textarea:focus,.edit-form select:focus{
            outline:none;
            border-color:var(--primary-dark);
            box-shadow:0 0 0 3px rgba(82,183,136,0.1);
        }
        .edit-btns{
            display:flex;
            gap:12px;
            justify-content:center;
            margin-top:8px;
        }
        .save-btn{
            background:var(--success);
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:10px;
            cursor:pointer;
            font-weight:500;
            transition:all 0.2s ease;
        }
        .cancel-btn{
            background:var(--gray);
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:10px;
            cursor:pointer;
            font-weight:500;
            transition:all 0.2s ease;
        }
        .del-course-btn{
            background:var(--danger);
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:10px;
            cursor:pointer;
            font-weight:500;
            transition:all 0.2s ease;
        }
        .save-btn:hover,.cancel-btn:hover,.del-course-btn:hover{
            transform:translateY(-1px);
            opacity:0.9;
        }
        
        .schedule-container{
            display:flex;
            gap:24px;
            align-items:stretch;
            width:100%;
            flex-wrap:wrap;
        }
        .schedule-table{
            flex: 3;
            min-width:320px;
            width: 100%;
            border:1px solid var(--border-color);
            border-radius:16px;
            padding:24px;
            background:rgba(255,255,255,.98);
            display:flex;
            flex-direction:column;
            overflow:hidden;
            box-shadow:0 2px 12px rgba(0,0,0,.04);
        }
        .schedule-form{
            flex: 1;
            min-width:260px;
            width: 100%;
            border:1px solid var(--border-color);
            border-radius:16px;
            padding:24px;
            background:rgba(255,255,255,.98);
            display:flex;
            flex-direction:column;
            box-shadow:0 2px 12px rgba(0,0,0,.04);
        }
        .schedule-title{
            font-size:22px;
            font-weight:600;
            color:var(--primary-dark);
            margin-bottom:24px;
            text-align:center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 10px;
            flex-wrap:wrap;
            position: relative;
        }
        .total-credit{
            font-size:16px;
            color:var(--success);
            font-weight:600;
        }
        .print-btn {
            position: absolute;
            top: 0;
            right: 0;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: none;
            background: transparent;
            font-size: 18px;
            cursor:pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-dark);
            z-index: 1;
        }
        .print-btn:hover {
            background: var(--primary);
            transform: scale(1.05);
        }
        .print-tooltip {
            position: absolute;
            right: 100%;
            margin-right: 8px;
            padding: 6px 10px;
            background: var(--primary-dark);
            color: white;
            font-size: 12px;
            border-radius: 6px;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
            pointer-events: none;
        }
        .print-btn:hover .print-tooltip {
            opacity: 1;
            visibility: visible;
        }
        .schedule-add-form{
            display:flex;
            flex-direction:column;
            gap:14px;
            width:100%;
        }
        .schedule-add-form input,
        .schedule-add-form select,
        .schedule-add-form button{
            width:100% !important;
            padding:12px;
            border:1px solid var(--border-color);
            border-radius:10px;
            font-size:14px;
            transition:all 0.2s ease;
        }
        .schedule-add-form input:focus,.schedule-add-form select:focus{
            outline:none;
            border-color:var(--primary-dark);
            box-shadow:0 0 0 3px rgba(82,183,136,0.1);
        }
        .schedule-add-form button{
            background:var(--success);
            color:white;
            border:none;
            font-weight:600;
            cursor:pointer;
            margin-top:8px;
            transition:all 0.2s ease;
        }
        .schedule-add-form button:hover{
            background:#22C55E;
            transform:translateY(-1px);
            box-shadow:0 4px 12px rgba(34,197,94,0.2);
        }
        .schedule-table-content{
            width:100%;
            border-collapse:collapse;
            flex:1;
            table-layout:fixed;
            overflow-x:auto;
            min-height:420px;
            display:block;
            border-radius:12px;
            overflow:hidden;
        }
        .schedule-table-content th,.schedule-table-content td{
            border:1px solid var(--border-color);
            padding:12px;
            text-align:center;
            font-size:14px;
            vertical-align:top;
            min-height:100px;
            word-break:break-all;
            min-width:90px;
            background:white;
        }
        .schedule-table-content td:first-child {
            white-space: pre-line;
            vertical-align: middle;
            padding:10px 8px;
            line-height:1.5;
            font-weight:500;
            background:var(--light-gray);
        }
        .schedule-table-content th{
            background:var(--primary);
            color:var(--primary-dark);
            position:sticky;
            top:0;
            font-weight:600;
            font-size:15px;
        }
        .course-item{
            padding:8px 0;
            font-size:15px;
            margin:6px 0;
            cursor:pointer;
            font-weight:600;
            transition:all 0.2s ease;
            line-height:1.4;
            word-break:break-all;
            white-space:normal;
            text-align:center;
        }
        .course-item:hover{
            opacity:0.8;
            transform:scale(1.05);
        }
        .course-info{
            font-size:11px;
            margin-top:8px;
            line-height:1.3;
            color:#9CA3AF;
            text-align:center;
            white-space:normal;
            word-break:break-all;
        }
        
        .guide-container{
            max-width:800px;
            margin:0 auto;
            padding:28px;
            background:rgba(255,255,255,.98);
            border-radius:16px;
            box-shadow:0 2px 12px rgba(0,0,0,.04);
        }
        .guide-title{
            text-align:center;
            color:var(--primary-dark);
            margin-bottom:24px;
            font-size:24px;
            font-weight:600;
        }
        #guideContent{
            width:100%;
            padding:18px;
            border:1px solid var(--border-color);
            border-radius:12px;
            font-size:15px;
            line-height:1.7;
            resize:vertical;
            transition:all 0.2s ease;
        }
        #guideContent:focus{
            outline:none;
            border-color:var(--primary-dark);
            box-shadow:0 0 0 3px rgba(82,183,136,0.1);
        }
        .guide-save-box{
            display: flex; 
            gap: 16px; 
            justify-content: center; 
            margin-top:20px; 
            flex-wrap: wrap;
        }
        .export-btn,.import-btn{
            padding:14px 32px;
            border:none;
            border-radius:12px;
            font-weight:600;
            cursor:pointer;
            font-size:15px;
            transition:all 0.2s ease;
        }
        .export-btn{background: var(--primary-dark) !important;color:white;}
        .import-btn{background: var(--warning) !important;color:white;}
        .export-btn:hover,.import-btn:hover{
            transform:translateY(-1px);
            box-shadow:0 4px 12px rgba(0,0,0,.1);
        }
        /* 美食模块样式 */
        .food-grid {
            flex: 2;
            min-width: 360px;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            background: rgba(255, 255, 255, .98);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, .04);
            transition: all 0.3s ease;
        }
        .food-grid:hover {
            box-shadow: 0 4px 20px rgba(0, 0, 0, .06);
        }
        .food-item {
            padding: 16px;
            border-radius: 12px;
            background: var(--light-gray);
            border-left: 4px solid var(--primary-dark);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 8px;
            height: 100%;
            justify-content: center;
        }
        .food-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(82, 183, 136, 0.15);
            background: var(--primary);
        }
        .food-name {
            font-weight: 600;
            color: var(--primary-dark);
            font-size: 16px;
            text-align: center;
            word-break: break-all;
        }
        .food-desc {
            font-size: 12px;
            color: var(--gray);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-align: center;
        }
        .food-panel {
            flex: 1;
            min-width: 360px;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            background: rgba(255, 255, 255, .98);
            display: flex;
            flex-direction: column;
            box-shadow: 0 2px 12px rgba(0, 0, 0, .04);
            transition: all 0.3s ease;
            position: relative;
        }
        .food-panel:hover {
            box-shadow: 0 4px 20px rgba(0, 0, 0, .06);
        }
        .food-panel::before {
            content: '';
            position: absolute;
            bottom: 24px;
            right: 24px;
            width: 90px;
            height: 90px;
            background-image: var(--bg-img);
            background-size: 100% 100%;
            opacity: .1;
        }
        /* 记事本模块样式 */
        .note-grid {
            flex: 2;
            min-width: 360px;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            background: rgba(255, 255, 255, .98);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, .04);
            transition: all 0.3s ease;
        }
        .note-grid:hover {

const calcTotalCredit = () => {
    const countedCourses = new Set();
    return Math.round(scheduleList.reduce((total, item) => {
        const courseName = (item.name || '').trim();
        if (courseName && !countedCourses.has(courseName)) {
            countedCourses.add(courseName);
            return total + parseFloat(item.credit || 0);
        }
        return total;
    }, 0));
};
const updateTotalCredit = () => {

    const finalCredit = total + 3;

};
// 弹窗拖拽
const dragModal = modal => {
    let isDrag = false, offsetX, offsetY;
    modal.addEventListener('mousedown', e => {
        const target = e.target;
        const rect = modal.getBoundingClientRect();
        const isResizeArea = (e.clientX > rect.right - 15) && (e.clientY > rect.bottom - 15);
        if(target.tagName === 'INPUT' || target.tagName === 'SELECT' || target.tagName === 'TEXTAREA' || target.tagName === 'BUTTON' || isResizeArea) return;
        e.preventDefault();
        isDrag = true; 
        offsetX = e.clientX - modal.offsetLeft;
        offsetY = e.clientY - modal.offsetTop;
    });
    document.addEventListener('mousemove', e => {
        if(!isDrag) return;
        modal.style.left = e.clientX - offsetX + 'px';
        modal.style.top = e.clientY - offsetY + 'px';
        modal.style.transform = 'none';
    });
    document.addEventListener('mouseup', () => isDrag = false);
};
// 日历渲染
const renderCalendar = () => {
    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();
    dom.currentMonth.textContent = `${year}年${month+1}月`;
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month+1, 0).getDate();
    dom.calendarDays.innerHTML = '';
    
    for(let i=0; i<firstDay; i++){
        const empty = document.createElement('div');
        dom.calendarDays.appendChild(empty);
    }
    
    for(let day=1; day<=daysInMonth; day++){
        const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        const dayEl = document.createElement('div');
        dayEl.className = 'day';
        
        const dayTodos = todoList.filter(t => t.date === dateStr);
        if(dayTodos.length > 0) {
            dayEl.classList.add('has-todo');
            dayEl.classList.add(`todo-count-${Math.min(dayTodos.length, 3)}`);
        }
        
        // --- 新增：检查日本节假日 ---
        const jpHolidayName = japaneseHolidays[dateStr];
        if (jpHolidayName) {
            dayEl.classList.add('jp-holiday');
        }
        
        // --- 新增：检查中国节日 ---
        const cnFestivalName = chineseFestivals[dateStr];
        if (cnFestivalName) {
            dayEl.classList.add('cn-festival');
        }
        
        // 构建节日名称HTML
        let holidayHtml = '';
        if (jpHolidayName) {
            holidayHtml += `<div class="holiday-name-jp">🇯🇵 ${jpHolidayName}</div>`;
        }
        if (cnFestivalName) {
            holidayHtml += `<div class="holiday-name-cn">🇨🇳 ${cnFestivalName}</div>`;
        }
        
        const todoHtml = dayTodos.slice(0,3).map(t => `
            <div class="day-todo-title todo-title-${t.type}">${t.title}</div>
        `).join('');
        
        dayEl.innerHTML = `
            <div class="day-number">${day}</div>
            ${holidayHtml}
            <div class="day-tags">${todoHtml}</div>
        `;
        
        dayEl.onclick = () => {
            $$('.day').forEach(d => d.classList.remove('active'));
            dayEl.classList.add('active');
            selectedDate = dateStr;
            dom.selectedDate.textContent = dateStr;

        };

    }
};

                    s => Number(s.day) === day && Number(s.section) === idx + 1
                );
                td.innerHTML = courses.map(c => `
                    <div class="course-item" data-id="${c.id}" style="color:${getCourseColor(c.name)}">
                       <div class="course-code" style="font-size:12px; font-weight:600; margin-bottom:4px; color:#6366F1;">
                           ${c.code ? `📘 ${c.code}` : ''}
                       </div>
                       <div class="course-name">${c.name}</div>
                       <div class="course-teacher">${c.teacher || ''}</div>
                       <div class="course-room-credit">
                           ${c.room || ''}${c.credit ? ` | ${c.credit}学分` : ''}
                       </div>
                    </div>
                `).join('');
                tr.appendChild(td);
            }
        }

        dom.scheduleBody.appendChild(tr);
    });

    updateTotalCredit();

    setTimeout(() => {
        const table = document.getElementById('scheduleTable');
        const headerCells = table.querySelectorAll('thead th');
        const rows = table.querySelectorAll('tbody tr');
        let saturdayHasCourse = false;

        rows.forEach(row => {
            const cells = row.querySelectorAll('td');
            if (cells[6] && cells[6].querySelector('.course-item')) {
                saturdayHasCourse = true;
            }
        });

        if (!saturdayHasCourse) {
            headerCells[6].style.display = 'none';
            rows.forEach(row => {
                const cells = row.querySelectorAll('td');
                if (cells[6]) cells[6].style.display = 'none';
            });
        }
    }, 0);
};
// 备份数据
const backupAllData = () => {
    const data = { todo: todoList, schedule: scheduleList, guide: dom.guideContent.value, food: foodList, note: noteList };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `Inspiration备份_${new Date().toLocaleDateString()}.json`;
    a.click();
    URL.revokeObjectURL(url);
};
// 导入数据
const importAllData = (file) => {
    const reader = new FileReader();
    reader.onload = e => {
        try {
            const data = JSON.parse(e.target.result);
            todoList = data.todo || []; scheduleList = data.schedule || [];
            guideContent = data.guide || ''; foodList = data.food || []; noteList = data.note || [];
            saveTodo(); saveSchedule(); localStorage.setItem('collegeGuide', guideContent); saveFood(); saveNote();
            dom.guideContent.value = guideContent;
            renderCalendar(); renderTodoList(); renderSchedule(); renderFood(); renderNote();
            alert('数据导入成功！');
        } catch (err) { alert('导入失败，文件格式错误！'); }
    };
    reader.readAsText(file);
};
// 标签页切换
const switchTab = (tab) => {
    $$
('.tab-btn').forEach(btn => btn.classList.remove('active'));
    $$('.panel').forEach(p => p.classList.remove('active'));
    $(`.tab-btn[data-tab="${tab}"]`).classList.add('active');
    $(`#${tab}Panel`).classList.add('active');
};
// 云端同步功能
// ☁️ 云端同步功能（最终稳定版）
const syncManager = {
    gistId: localStorage.getItem('gistId') || '',
    token: localStorage.getItem('gistToken') || '',

    // 保存配置
    saveConfig() {
        this.gistId = document.getElementById('gistId').value.trim();
        this.token = document.getElementById('gistToken').value.trim();
        localStorage.setItem('gistId', this.gistId);
        localStorage.setItem('gistToken', this.token);
        document.getElementById('syncStatus').textContent = '✅ 配置保存成功！';
        setTimeout(() => document.getElementById('syncStatus').textContent = '', 2000);
    },

    // ⬆️ 上传到云端
    async upload() {
        if (!this.gistId || !this.token) {
            alert('请先填写并保存 Gist ID 和 Token！');
            return;
        }

        const data = {
            todo: JSON.parse(localStorage.getItem('collegeTodo')) || [],
            schedule: JSON.parse(localStorage.getItem('collegeSchedule')) || [],
            guide: localStorage.getItem('collegeGuide') || '',
            food: JSON.parse(localStorage.getItem('collegeFood')) || [],
            note: JSON.parse(localStorage.getItem('collegeNote')) || [],
            lastSync: new Date().toISOString()
        };

        try {
            const response = await fetch(`https://api.github.com/gists/${this.gistId}`, {
                method: 'PATCH',
                headers: {
                    'Authorization': `token ${this.token}`,
                    'Content-Type': 'application/json',
                    'Accept': 'application/vnd.github.v3+json' // ✅ 必须
                },
                body: JSON.stringify({
                    files: {
                        'inspiration_data.json': {
                            content: JSON.stringify(data, null, 2)
                        }
                    }
                })
            });

            if (response.ok) {
                document.getElementById('syncStatus').textContent = '🎉 上传成功！';
            } else {
                const err = await response.json();
                throw new Error(err.message || `GitHub 错误：${response.status}`);
            }
        } catch (error) {
            document.getElementById('syncStatus').textContent = '❌ 上传失败：' + error.message;
        }
        setTimeout(() => document.getElementById('syncStatus').textContent = '', 4000);
    },

    // ⬇️ 从云端下载
    async download() {
        if (!this.gistId || !this.token) {
            alert('请先填写并保存 Gist ID 和 Token！');
            return;
        }

        try {
            const response = await fetch(`https://api.github.com/gists/${this.gistId}`, {
                headers: {
                    'Authorization': `token ${this.token}`,
                    'Accept': 'application/vnd.github.v3+json' // ✅ 必须
                }
            });

            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.message || `GitHub 错误：${response.status}`);
            }

            const gist = await response.json();
            const file = gist.files['inspiration_data.json'];

            if (!file) {
                throw new Error('云端未找到 inspiration_data.json 文件');
            }

            const data = JSON.parse(file.content);

            // 更新内存数据
            todoList = data.todo || [];
            scheduleList = data.schedule || [];
            guideContent = data.guide || '';
            foodList = data.food || [];
            noteList = data.note || [];

            // 写入本地
            saveTodo();
            saveSchedule();
            localStorage.setItem('collegeGuide', guideContent);
            saveFood();
            saveNote();

            // 刷新界面
            renderCalendar();
            renderTodoList();
            renderSchedule();
            renderFood();
            renderNote();
            dom.guideContent.value = guideContent;

            document.getElementById('syncStatus').textContent = '🎉 下载成功！';
        } catch (error) {
            document.getElementById('syncStatus').textContent = '❌ 下载失败：' + error.message;
        }
        setTimeout(() => document.getElementById('syncStatus').textContent = '', 4000);
    }
};
// 初始化
const init = () => {
    // 默认激活备忘录标签
    switchTab('memo');
    // 渲染所有模块
    renderCalendar();
    renderSchedule();
    renderFood();
    renderNote();
    dom.guideContent.value = guideContent;
    renderRecentTodo();
    // 弹窗拖拽
    [dom.editModal, dom.detailModal, dom.scheduleEditModal, dom.foodDetailModal, dom.foodEditModal, dom.noteDetailModal, dom.noteEditModal].forEach(dragModal);
    // 标签页绑定
    $$('.tab-btn').forEach(btn => {
        btn.onclick = () => switchTab(btn.dataset.tab);
    });
    // 日历月份切换
    dom.prevMonth.onclick = () => { currentDate.setMonth(currentDate.getMonth() - 1); renderCalendar(); };
    dom.nextMonth.onclick = () => { currentDate.setMonth(currentDate.getMonth() + 1); renderCalendar(); };
    // 备忘录添加
    dom.addForm.onsubmit = (e) => {
        e.preventDefault();
        if (!selectedDate) return alert('请先选择日期！');
        const todo = {
            id: Date.now(), date: selectedDate, type: dom.todoType.value,
            title: dom.todoTitle.value, content: dom.todoContent.value
        };
        todoList.push(todo); saveTodo();
        dom.addForm.reset(); renderTodoList(); renderCalendar();
    };
    // 待办编辑/删除/关闭
    dom.detailEditBtn.onclick = fillEditTodo;
    dom.detailDelBtn.onclick = deleteTodo;
    dom.closeDetail.onclick = closeModal;
    dom.editForm.onsubmit = (e) => {
        e.preventDefault();
        const todo = todoList.find(t => t.id == currentEditId);
        todo.type = dom.editType.value; todo.title = dom.editTitle.value; todo.content = dom.editContent.value;
        saveTodo(); renderTodoList(); renderCalendar(); closeModal();
    };
    dom.cancelEdit.onclick = closeModal;
    // 课程表添加
    dom.scheduleAddForm.onsubmit = (e) => {
        e.preventDefault();
        const course = {
            id: Date.now(), code: dom.courseCode.value, name: dom.courseName.value, teacher: dom.courseTeacher.value,
            room: dom.courseRoom.value, credit: dom.courseCredit.value,
            day: dom.courseDay.value, section: dom.courseSection.value
        };
        scheduleList.push(course); saveSchedule();
        dom.scheduleAddForm.reset(); renderSchedule();
    };
    // 课程编辑/删除
    dom.scheduleEditForm.onsubmit = (e) => {
        e.preventDefault();
        const course = scheduleList.find(c => c.id == currentScheduleEditId);
        course.name = dom.editCourseName.value; course.code = dom.editCourseCode.value; course.teacher = dom.editCourseTeacher.value;
        course.room = dom.editCourseRoom.value; course.credit = dom.editCourseCredit.value;
        course.day = dom.editCourseDay.value; course.section = dom.editCourseSection.value;
        saveSchedule(); renderSchedule(); closeModal();
    };
    dom.delCourseBtn.onclick = () => {
        if(!confirm('确定删除该课程吗？')) return;
        scheduleList = scheduleList.filter(c => c.id != currentScheduleEditId);
        saveSchedule(); renderSchedule(); closeModal();
    };
    dom.cancelScheduleEdit.onclick = closeModal;
    // 课程点击编辑
    dom.scheduleBody.onclick = (e) => {
    const item = e.target.closest('.course-item');
    if (item) {
        openScheduleEditModal(item.dataset.id);
    }
};
    // 使用说明
    dom.saveGuideBtn.onclick = saveGuide;
    // 备份/导入
    dom.backupAllBtn.onclick = backupAllData;
    dom.importAllBtn.onclick = () => dom.allImportFile.click();
    dom.allImportFile.onchange = (e) => { if (e.target.files[0]) importAllData(e.target.files[0]); };
    // 打印课程表
    dom.printScheduleBtn.onclick = () => window.print();
    // 美食模块
    dom.foodAddForm.onsubmit = (e) => {
        e.preventDefault();
        const food = { id: Date.now(), name: dom.foodName.value, content: dom.foodContent.value };
        foodList.push(food); saveFood();
        dom.foodAddForm.reset(); renderFood();
    };
    dom.foodCloseDetail.onclick = closeModal;
    dom.foodDetailEditBtn.onclick = fillEditFood;
    dom.foodDetailDelBtn.onclick = deleteFood;
    dom.foodEditForm.onsubmit = (e) => {
        e.preventDefault();
        const food = foodList.find(f => f.id == currentFoodEditId);
        food.name = dom.foodEditName.value; food.content = dom.foodEditContent.value;
        saveFood(); renderFood(); closeModal();
    };
    dom.foodCancelEdit.onclick = closeModal;
    // 记事本模块
    dom.noteAddForm.onsubmit = (e) => {
        e.preventDefault();
        const note = { id: Date.now(), name: dom.noteName.value, content: dom.noteContent.value };
        noteList.push(note); saveNote();
        dom.noteAddForm.reset(); renderNote();
    };
    dom.noteCloseDetail.onclick = closeModal;
    dom.noteDetailEditBtn.onclick = fillEditNote;
    dom.noteDetailDelBtn.onclick = deleteNote;
    dom.noteEditForm.onsubmit = (e) => {
        e.preventDefault();
        const note = noteList.find(n => n.id == currentNoteEditId);
        note.name = dom.noteEditName.value; note.content = dom.noteEditContent.value;
        saveNote(); renderNote(); closeModal();
    };
    dom.noteCancelEdit.onclick = closeModal;
};
// 页面加载完成后初始化
// 云端同步相关
    document.getElementById('saveSyncConfig').onclick = () => syncManager.saveConfig();
    document.getElementById('uploadToCloud').onclick = () => syncManager.upload();
    document.getElementById('downloadFromCloud').onclick = () => syncManager.download();
    
    // 自动填充已保存的配置
    if (syncManager.gistId) document.getElementById('gistId').value = syncManager.gistId;
    if (syncManager.token) document.getElementById('gistToken').value = syncManager.token;
window.addEventListener('DOMContentLoaded', init);
</script>
