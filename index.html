<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Inspiration</title>
    <style>
        .course-teacher,
        .course-room-credit {
            font-size: 11px;
            color: #9CA3AF;
            font-weight: normal;
            line-height: 1.4;
}
        .course-teacher {
            margin-top: 6px;
}
        .course-room-credit {
            margin-top: 2px;
}
        *{margin:0;padding:0;box-sizing:border-box;font-family:"KaiTi","SimSun","Microsoft YaHei",serif}
        :root {
            --primary: #C4A484;       /* 宣纸色 - 传统宣纸质感 */
            --primary-dark: #8B4513;  /* 徽墨色 - 深棕色墨色 */
            --success: #87A96B;       /* 竹青色 - 清新竹叶绿 */
            --warning: #D4AF37;       /* 鎏金色 - 传统描金色 */
            --purple: #B19CD9;        /* 藕荷色 - 淡雅紫调 */
            --danger: #C93756;         /* 胭脂色 - 传统胭脂红 */
            --gray: #5D4037;          /* 黛色 - 深灰带棕 */
            --light-gray: #F5F0E6;    /* 素绢色 - 米白绢质感 */
            --border-color: #D4AF37;  /* 描金边框 */
            --bg-img: url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAwIiBoZWlnaHQ9IjIwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMjAwIiBoZWlnaHQ9IjIwMCIgZmlsbD0iI2Y1ZjBlNiIvPjxwYXRoIGQ9Ik0xMDAgNTBjMjcuNiAwIDUwIDIyLjQgNTAgNTBzLTIyLjQgNTAtNTAgNTAtNTAtMjIuNC01MC01MCAyMi40LTUwIDUwLTUweiIgZmlsbD0iI2M0YTQ4NCIgZmlsbC1vcGFjaXR5PSIwLjEiLz48L3N2Zz4=');
        }
        body{
            background: 
                linear-gradient(135deg, #F5F0E6 0%, #E8DCCA 25%, #D9C8A9 50%, #C4A484 75%, #A68B6F 100%),
                repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(212,175,55,0.02) 10px, rgba(212,175,55,0.02) 20px);
            padding:24px;
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(139,69,19,0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(135,169,107,0.03) 0%, transparent 50%),
                var(--bg-img);
            background-size: 400px, 400px, 180px;
            background-position: left top, right bottom, center 80px;
            background-repeat: no-repeat;
            background-attachment: fixed;
            opacity:0.98;
            min-height:100vh;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
            touch-action: pan-y;
            -webkit-overflow-scrolling: touch;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 10% 10%, rgba(212,175,55,0.02) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(177,156,217,0.02) 0%, transparent 40%);
            pointer-events: none;
            z-index: -1;
        }
        .container{
            max-width:1400px;
            width: 100%;
            margin:0 auto;
            background: 
                linear-gradient(145deg, rgba(255,255,255,.95), rgba(245,240,230,.8)),
                url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgZmlsbD0idHJhbnNwYXJlbnQiLz48cGF0aCBkPSJNNTAgMTBjMjIgMCA0MCAxOCA0MCA0MHMtMTggNDAtNDAgNDAtNDAtMTgtNDAtNDAgMTgtNDAgNDAtNDB6IiBmaWxsPSIjZjVmMGU2IiBmaWxsLW9wYWNpdHk9IjAuMSIvPjwvc3ZnPg==') repeat;
            border-radius:20px;
            box-shadow: 
                0 8px 32px rgba(139,69,19,.15),
                inset 0 1px 0 rgba(255,255,255,.6),
                inset 0 -1px 0 rgba(139,69,19,.1);
            padding:28px;
            backdrop-filter:blur(20px);
            border: 2px solid #D4AF37;
            position: relative;
            border-image: linear-gradient(45deg, #D4AF37, #C4A484, #D4AF37) 1;
        }
        
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 10% 10%, rgba(212,175,55,0.05) 0%, transparent 30%),
                radial-gradient(circle at 90% 90%, rgba(135,169,107,0.05) 0%, transparent 30%);
            border-radius: 20px;
            pointer-events: none;
        }
        .header{
            text-align:center;
            margin-bottom:28px;
            color:var(--primary-dark);
            display:flex;
            align-items:center;
            justify-content:center;
            gap:12px;
        }
        .header h1{
            font-size:32px;
            font-weight:700;
            letter-spacing:3px;
            color: #8B4513;
            text-shadow: 
                2px 2px 4px rgba(139,69,19,0.3),
                0 0 20px rgba(212,175,55,0.3);
            background: linear-gradient(45deg, #8B4513, #D4AF37, #8B4513);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            font-family: "KaiTi", "SimSun", "Microsoft YaHei", serif;
        }
        .header h1::before {
            content: '❀ ';
            color: #D4AF37;
            text-shadow: 0 0 10px rgba(212,175,55,0.5);
        }
        .header h1::after {
            content: ' ❀';
            color: #D4AF37;
            text-shadow: 0 0 10px rgba(212,175,55,0.5);
        }
        .header-logo{
            width:44px;
            height:44px;
            background-image:var(--bg-img);
            background-size:100% 100%;
            background-repeat:no-repeat;
            border-radius:12px;
        }
        
        .tab-bar{
            display:flex;
            gap:12px;
            margin-bottom:28px;
            justify-content:center;
            flex-wrap:wrap;
        }
        .tab-btn{
            padding:12px 28px;
            border:none;
            border-radius:12px;
            background: linear-gradient(145deg, #F5F0E6, #E8DCCA);
            color: #5D4037;
            cursor:pointer;
            font-size:16px;
            font-weight:600;
            transition:all 0.3s ease;
            border:1px solid rgba(212,175,55,0.3);
            position: relative;
            overflow: hidden;
            font-family: "KaiTi", "SimSun", "Microsoft YaHei", serif;
            box-shadow: inset 0 1px 0 rgba(255,255,255,.8), 0 2px 4px rgba(139,69,19,.1);
        }
        .tab-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212,175,55,0.2), transparent);
            transition: left 0.5s;
        }
        .tab-btn:hover::before {
            left: 100%;
        }
        .tab-btn.active{
            background: linear-gradient(135deg, #D4AF37, #C4A484);
            color: #F5F0E6;
            border:2px solid #D4AF37;
            transform:translateY(-2px);
            box-shadow:0 4px 12px rgba(139,69,19,.3), inset 0 1px 0 rgba(255,255,255,.3);
            text-shadow: 0 1px 2px rgba(139,69,19,.5);
        }
        .tab-btn:hover:not(.active){
            background:#F3F4F6;
            transform:translateY(-1px);
        }
        
        .panel{display:none}
        .panel.active{display:block}
        
        .main{
            display:flex;
            gap:24px;
            flex-wrap:wrap;
            align-items:stretch;
        }
        .calendar,.todo-panel{
            flex:1;
            min-width:360px;
            border:2px solid #D4AF37;
            border-radius:16px;
            padding:20px;
            background: 
                linear-gradient(145deg, rgba(255,255,255,.95), rgba(245,240,230,.8)),
                url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNTAiIGhlaWdodD0iNTAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHJlY3Qgd2lkdGg9IjUwIiBoZWlnaHQ9IjUwIiBmaWxsPSJ0cmFuc3BhcmVudCIvPjxwYXRoIGQ9Ik0yNSAxNWM1LjUgMCAxMCA0LjUgMTAgMTBzLTQuNSAxMC0xMCAxMC0xMC00LjUtMTAtMTAgNC41LTEwIDEwLTEweiIgZmlsbD0iI2Y1ZjBlNiIgZmlsbC1vcGFjaXR5PSIwLjEiLz48L3N2Zz4=') repeat;
            display:flex;
            flex-direction:column;
            box-shadow:0 4px 16px rgba(139,69,19,.1), inset 0 1px 0 rgba(255,255,255,.6);
            transition:all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .calendar::before, .todo-panel::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(212,175,55,0.03) 0%, transparent 70%);
            animation: float 8s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(5px, 5px) rotate(120deg); }
            66% { transform: translate(-5px, -5px) rotate(240deg); }
        }
        .calendar {
            touch-action: pan-y;
            overflow: hidden;
        }
        .calendar-days {
            transition: transform 0.25s ease;
            will-change: transform;
            touch-action: pan-y;
            width: 100%;
            display: grid;
        }
        .calendar:hover,.todo-panel:hover{
            box-shadow:0 4px 20px rgba(0,0,0,.06);
        }
        .calendar-header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:20px;
        }
        .calendar-header h3{
            font-size:20px;
            color:#C8102E;
            font-weight:600;
        }
        .calendar-header button{
            padding:8px 14px;
            background: linear-gradient(135deg, #FFD700, #DAA520);
            color: #C8102E;
            border:1px solid #C8102E;
            border-radius:8px;
            cursor:pointer;
            font-weight:500;
            transition:all 0.2s ease;
        }
        .calendar-header button:hover{
            background: linear-gradient(135deg, #DAA520, #FFD700);
            color: #FFFFFF;
        }
        .calendar-week{
            display:grid;
            grid-template-columns:repeat(7,1fr);
            text-align:center;
            font-weight:600;
            color:#9CA3AF;
            margin-bottom:12px;
            font-size:14px;
        }
        .calendar-days{
            display:grid;
            grid-template-columns:repeat(7,1fr);
            gap:6px;
            flex:1;
            grid-auto-rows:1fr;
        }
        .day{
            width:100%;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:flex-start;
            border-radius:10px;
            cursor:pointer;
            transition:all 0.2s ease;
            font-size:14px;
            padding:10px 4px;
            overflow:hidden;
            position:relative;
            height:100%;
            background:white;
        }
        .day.holiday{
            color: var(--danger) !important;
            font-weight: 700 !important;
        }
        .holiday-name{
            font-size:9px;
            color:var(--danger);
            white-space:normal;
            overflow:hidden;
            text-overflow:ellipsis;
            display:-webkit-box;
            -webkit-line-clamp:2;
            -webkit-box-orient:vertical;
            line-height:1.1;
            max-height:2.2em;
            word-break:break-word;
            width:100%;
            text-align:center;
            margin-top:2px;
        }
        .day-number{
            margin-bottom:6px;
            height:22px;
            line-height:22px;
            font-weight:500;
        }
        .day-tags{
            margin-top:auto;
            width:100%;
            display:flex;
            flex-direction:column;
            gap:2px;
        }
        .day:hover{
            background: linear-gradient(135deg, #D4AF37, #C4A484);
            transform:scale(0.96);
            color: #F5F0E6;
            text-shadow: 0 1px 2px rgba(139,69,19,.5);
        }
        .day.active{
            background: linear-gradient(135deg, #8B4513, #5D4037);
            color: #F5F0E6!important;
            font-weight:600;
            box-shadow:0 2px 8px rgba(139,69,19,.3), inset 0 1px 0 rgba(255,255,255,.3);
        }
        .day.has-todo::after{
            content:'';
            width:6px;
            height:6px;
            background:var(--danger);
            border-radius:50%;
            position:absolute;
            top:6px;
            right:8px;
        }
        .day.has-work::before{
            content:'';
            width:6px;
            height:6px;
            background:#F59E0B;
            border-radius:50%;
            position:absolute;
            top:6px;
            right:20px;
        }
        .day-todo-title{
            line-height:1.2;
            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
            width:100%;
            text-align:center;
            font-size:9px;
            font-weight:500;
        }
        .day.todo-count-1 .day-todo-title,
        .day.todo-count-2 .day-todo-title,
        .day.todo-count-3 .day-todo-title {
            font-size:9px !important;
            font-weight:500 !important;
        }
        .day-work-title{
            line-height:1.2;
            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
            width:100%;
            text-align:center;
            font-size:10px;
            color: #F59E0B; /* 金色 */
            font-weight: 600;
        }
        .todo-title-class{color:#C8102E}
        .todo-title-homework{color:#228B22}
        .todo-title-exam{color:#FFA500}
        .todo-title-meeting{color:#800080}
        .todo-title-other{color:#2F4F4F}
        .todo-panel{position:relative}
        .todo-panel::before{
            content:'';
            position:absolute;
            bottom:24px;
            right:24px;
            width:90px;
            height:90px;
            background-image:var(--bg-img);
            background-size:100% 100%;
            opacity:.1;
        }
        .work-form-section {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
        }
        .work-stats{
            margin-top: 16px;
            padding: 12px;
            background: linear-gradient(145deg, #F5F5DC, #FFFACD);
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
            color: #C8102E;
            border: 1px solid #DAA520;
        }
        .work-income {
            white-space: normal;
        }
@media (max-width: 768px) {
    .summary-display {
        gap: 20px;
        margin-bottom: 20px;
        flex-wrap: nowrap;
        overflow-x: auto;
        justify-content: flex-start;
        padding: 10px 0;
    }
    
    .summary-player {
        min-width: 80px;
        flex: 0 0 auto;
    }
}
    
    .summary-player {
        min-width: 80px;          /* 设置最小宽度 */
        flex: 0 0 auto;          /* 不伸缩，自动宽度 */
    }
}
        .stats-btn{
            margin-top: 12px;
            padding: 8px 16px;
            background: linear-gradient(135deg, #FFD700, #DAA520);
            color: #C8102E;
            border: 1px solid #C8102E;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        .stats-btn:hover{
            background: linear-gradient(135deg, #DAA520, #FFD700);
            color: #FFFFFF;
        }
        .stats-filters {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
            padding: 16px;
            background: var(--light-gray);
            border-radius: 8px;
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .filter-group label {
            font-weight: 500;
            color: var(--primary-dark);
            min-width: 70px;
        }
        .filter-group input[type="date"] {
            padding: 6px 8px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
        }
        .query-btn {
            padding: 8px 16px;
            background: linear-gradient(135deg, #228B22, #32CD32);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s ease;
            align-self: flex-end;
        }
        .query-btn:hover {
            background: linear-gradient(135deg, #32CD32, #228B22);
        }
        .stats-summary {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .stats-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: linear-gradient(145deg, #FFFFFF, #FFFACD);
            border-radius: 6px;
            border: 1px solid #DAA520;
        }
        .stats-label {
            font-weight: 500;
            color: #C8102E;
        }
        .stats-value {
            font-weight: 600;
            color: #228B22;
        }
        .selected-date{
            font-size:20px;
            font-weight:600;
            color:#C8102E;
            margin-bottom:20px;
            text-align:center;
            padding-left:28px;
            background-image:var(--bg-img);
            background-repeat:no-repeat;
            background-position:left center;
            background-size:20px;
        }
        .add-form{
            display:flex;
            flex-direction:column;
            gap:12px;
            margin-bottom:24px;
        }
        .add-form input,.add-form textarea,.add-form select{
            padding:12px;
            border:2px solid #DAA520;
            border-radius:10px;
            resize:vertical;
            font-size:14px;
            transition:all 0.2s ease;
            background: #FFFACD;
            color: #2F4F4F;
        }
        .add-form input:focus,.add-form textarea:focus,.add-form select:focus{
            outline:none;
            border-color:#C8102E;
            box-shadow:0 0 0 3px rgba(200,16,46,0.2);
            background: #FFFFFF;
        }
        .add-btn{
            padding:12px;
            background: linear-gradient(135deg, #C8102E, #DC143C);
            color:white;
            border:none;
            border-radius:10px;
            cursor:pointer;
            font-weight:600;
            transition:all 0.2s ease;
            font-size:15px;
            box-shadow: 0 4px 8px rgba(200,16,46,0.3);
        }
        .add-btn:hover{
            background: linear-gradient(135deg, #DC143C, #C8102E);
            transform:translateY(-1px);
            box-shadow:0 6px 16px rgba(200,16,46,0.4);
        }
        .todo-list{
            flex:1;
            overflow-y:auto;
            position:relative;
            z-index:1;
            padding-right:8px;
        }
        .todo-list::-webkit-scrollbar{width:6px}
        .todo-list::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:3px}
        .todo-item{
            padding:14px;
            border-left:4px solid #D4AF37;
            background: linear-gradient(145deg, #F5F0E6, #FFFFFF);
            margin-bottom:10px;
            border-radius:10px;
            cursor:pointer;
            transition:all 0.2s ease;
            box-shadow: 0 2px 4px rgba(139,69,19,.1), inset 0 1px 0 rgba(255,255,255,.8);
            position: relative;
            border: 1px solid rgba(212,175,55,0.2);
        }
        .todo-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(to bottom, #D4AF37, #C4A484);
            border-radius: 10px 0 0 10px;
        }
        .todo-item:hover{
            transform:translateX(4px);
            box-shadow:0 4px 12px rgba(200,16,46,0.2);
            background: linear-gradient(145deg, #FFFACD, #F5F5DC);
        }
        .todo-title{
            font-weight:600;
            display:flex;
            align-items:center;
            margin-bottom:8px;
            gap:8px;
            flex-wrap:wrap;
            font-size:15px;
        }
        .todo-type{
            display:inline-block;
            padding:4px 10px;
            font-size:11px;
            border-radius:12px;
            color:white;
            margin-right:8px;
            font-weight:500;
        }
        .type-class { background: var(--primary-dark); }
        .type-homework { background: var(--success); }
        .type-exam { background: var(--warning); }
        .type-meeting { background: var(--purple); }
        .type-other { background: var(--gray); }
        
        /* 添加古风装饰元素 */
        .container::after {
            content: '❀';
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 20px;
            color: #D4AF37;
            opacity: 0.6;
            text-shadow: 0 0 10px rgba(212,175,55,0.3);
        }
        
        .tab-bar::before {
            content: '❁';
            position: absolute;
            left: 10px;
            font-size: 18px;
            color: #D4AF37;
            opacity: 0.7;
        }
        
        .tab-bar::after {
            content: '❁';
            position: absolute;
            right: 10px;
            font-size: 18px;
            color: #D4AF37;
            opacity: 0.7;
        }
        
        .header::before {
            content: '『';
            position: absolute;
            left: -30px;
            font-size: 24px;
            color: #D4AF37;
            opacity: 0.8;
        }
        
        .header::after {
            content: '』';
            position: absolute;
            right: -30px;
            font-size: 24px;
            color: #D4AF37;
            opacity: 0.8;
        }
        
        .modal-overlay{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,.2);
            z-index:998;
            display:none;
            backdrop-filter:blur(4px);
        }
        .modal-overlay.active{display:block}
        
        .detail-modal,.edit-modal{
            position:fixed;
            top:50%;
            left:50%;

            height: 200px;

            transform: rotate(-90deg);
        }
        .progress-bg {
            stroke: #e0e0e0;
        }
        .progress-bar {
            stroke-dasharray: 565.48; /* 2 * π * 90 */
            stroke-dashoffset: 565.48;
            transition: stroke-dashoffset 1s ease, stroke 0.5s ease;
        }
        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

            color: var(--gray);

        .progress-yellow .progress-bar {
            stroke: #FFA500;
        }
        .progress-red .progress-bar {
            stroke: #DC143C;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.3; }

// 弹窗拖拽
const dragModal = modal => {
    let isDrag = false, offsetX, offsetY;
    modal.addEventListener('mousedown', e => {
        const target = e.target;
        const rect = modal.getBoundingClientRect();
        const isResizeArea = (e.clientX > rect.right - 15) && (e.clientY > rect.bottom - 15);
        if(target.tagName === 'INPUT' || target.tagName === 'SELECT' || target.tagName === 'TEXTAREA' || target.tagName === 'BUTTON' || isResizeArea) return;
        e.preventDefault();
        isDrag = true; 
        offsetX = e.clientX - modal.offsetLeft;
        offsetY = e.clientY - modal.offsetTop;
    });
    document.addEventListener('mousemove', e => {
        if(!isDrag) return;
        modal.style.left = e.clientX - offsetX + 'px';
        modal.style.top = e.clientY - offsetY + 'px';
        modal.style.transform = 'none';
    });
    document.addEventListener('mouseup', () => isDrag = false);
};

// 日历渲染
const renderCalendar = () => {
    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();
    dom.currentMonth.textContent = `${year}年${month+1}月`;
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month+1, 0).getDate();
    dom.calendarDays.innerHTML = '';
    
    for(let i=0; i<firstDay; i++){
        const empty = document.createElement('div');
        dom.calendarDays.appendChild(empty);
    }
    
    for(let day=1; day<=daysInMonth; day++){
        const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        const dayEl = document.createElement('div');
        dayEl.className = 'day';
        
        const dayTodos = todoList.filter(t => t.date === dateStr);
        if(dayTodos.length > 0) {
            dayEl.classList.add('has-todo');
            dayEl.classList.add(`todo-count-${Math.min(dayTodos.length, 3)}`);
        }
        
        const dayWorks = workList.filter(w => w.date === dateStr);
        if(dayWorks.length > 0) {
            dayEl.classList.add('has-work');
        }
        
        // --- 新增：检查日本节假日 ---
        const jpHolidayName = japaneseHolidays[dateStr];
        if (jpHolidayName) {
            dayEl.classList.add('jp-holiday');
        }
        
        // --- 新增：检查中国节日 ---
        const cnFestivalName = chineseFestivals[dateStr];
        if (cnFestivalName) {
            dayEl.classList.add('cn-festival');
        }
        const specialNote = specialCalendarNotes[dateStr];
        if (specialNote) {
            dayEl.classList.add('special-day');
        }
        
        // 构建节日名称HTML
        let holidayHtml = '';
        if (jpHolidayName) {
            holidayHtml += `<div class="holiday-name-jp">🇯🇵 ${jpHolidayName}</div>`;
        }
        if (cnFestivalName) {
            holidayHtml += `<div class="holiday-name-cn">🇨🇳 ${cnFestivalName}</div>`;
        }
        if (specialNote) {
            holidayHtml += `<div class="holiday-name-special">📌 ${specialNote}</div>`;
        }
        
        const todoHtml = dayTodos.slice(0,3).map(t => `
            <div class="day-todo-title todo-title-${t.type}" title="${t.title}">${formatCalendarTodoTitle(t.title)}</div>
        `).join('');
        
        const workHtml = dayWorks.length > 0 ? `<div class="day-work-title">打工</div>` : '';
        
        dayEl.innerHTML = `
            <div class="day-number">${day}</div>
            ${holidayHtml}
            <div class="day-tags">${todoHtml}${workHtml}</div>
        `;
        
        dayEl.onclick = () => {
            $$('.day').forEach(d => d.classList.remove('active'));
            dayEl.classList.add('active');
            selectedDate = dateStr;
            dom.selectedDate.textContent = dateStr;

            // 如果该日期有打工记录，显示打工详情

            }

    }

// ☁️ 云端同步功能（支持多学期版）
const syncManager = {
    gistId: localStorage.getItem('gistId') || '',
    token: localStorage.getItem('gistToken') || '',

    // 保存配置
    saveConfig() {
        this.gistId = document.getElementById('gistId').value.trim();
        this.token = document.getElementById('gistToken').value.trim();
        localStorage.setItem('gistId', this.gistId);
        localStorage.setItem('gistToken', this.token);
        document.getElementById('syncStatus').textContent = '✅ 配置保存成功！';
        setTimeout(() => document.getElementById('syncStatus').textContent = '', 2000);
    },

    // ⬆️ 上传到云端（支持多学期）
    async upload() {
        if (!this.gistId || !this.token) {
            alert('请先填写并保存 Gist ID 和 Token！');
            return;
        }

        const data = {
            todo: JSON.parse(localStorage.getItem('collegeTodo')) || [],
            scheduleBySemester: JSON.parse(localStorage.getItem('collegeScheduleBySemester')) || {}, // ✅ 修改这里
            guide: localStorage.getItem('collegeGuide') || '',
            food: JSON.parse(localStorage.getItem('collegeFood')) || [],
            note: JSON.parse(localStorage.getItem('collegeNote')) || [],
            work: JSON.parse(localStorage.getItem('collegeWork')) || [],
            visaExpiryDate: localStorage.getItem('visaExpiryDate') || '',
            lastSync: new Date().toISOString()
        };

        try {
            const response = await fetch(`https://api.github.com/gists/${this.gistId}`, {
                method: 'PATCH',
                headers: {
                    'Authorization': `token ${this.token}`,
                    'Content-Type': 'application/json',
                    'Accept': 'application/vnd.github.v3+json'
                },
                body: JSON.stringify({
                    files: {
                        'inspiration_data.json': {
                            content: JSON.stringify(data, null, 2)
                        }
                    }
                })
            });

            if (response.ok) {
                document.getElementById('syncStatus').textContent = '🎉 上传成功！';
            } else {
                const err = await response.json();
                throw new Error(err.message || `GitHub 错误：${response.status}`);
            }
        } catch (error) {
            document.getElementById('syncStatus').textContent = '❌ 上传失败：' + error.message;
        }
        setTimeout(() => document.getElementById('syncStatus').textContent = '', 4000);
    },

    // ⬇️ 从云端下载（支持多学期）
    async download() {
        if (!this.gistId || !this.token) {
            alert('请先填写并保存 Gist ID 和 Token！');
            return;
        }

        try {
            const response = await fetch(`https://api.github.com/gists/${this.gistId}`, {
                headers: {
                    'Authorization': `token ${this.token}`,
                    'Accept': 'application/vnd.github.v3+json'
                }
            });

            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.message || `GitHub 错误：${response.status}`);
            }

            const gist = await response.json();
            const file = gist.files['inspiration_data.json'];

            if (!file) {
                throw new Error('云端未找到 inspiration_data.json 文件');
            }

            const data = JSON.parse(file.content);

            // 更新内存数据
            todoList = data.todo || [];
            scheduleBySemester = data.scheduleBySemester || {}; // ✅ 修改这里
            guideContent = data.guide || '';
            foodList = data.food || [];
            noteList = data.note || [];
            workList = data.work || [];
            const savedExpiry = data.visaExpiryDate || '';

            // 写入本地
            saveTodo();
            saveScheduleBySemester(); // ✅ 使用新的保存函数
            localStorage.setItem('collegeGuide', guideContent);
            localStorage.setItem('visaExpiryDate', savedExpiry);
            saveFood();
            saveNote();
            saveWork();

            // 刷新界面
            loadVisaExpiry();
            renderCalendar();
            renderTodoList();
            renderSchedule();
            renderFood();
            renderNote();
            renderWorkStats();
            dom.guideContent.value = guideContent;

            // ✅ 更新学期选择器
            const semesterSelect = document.getElementById('semesterSelect');
            if (semesterSelect && Object.keys(scheduleBySemester).length > 0) {
                // 如果云端有学期数据，设置第一个学期为当前学期
                const firstSemester = Object.keys(scheduleBySemester)[0];
                currentSemester = firstSemester;
                semesterSelect.value = currentSemester;
                saveScheduleBySemester();
            }

            document.getElementById('syncStatus').textContent = '🎉 下载成功！';
        } catch (error) {
            document.getElementById('syncStatus').textContent = '❌ 下载失败：' + error.message;
        }
        setTimeout(() => document.getElementById('syncStatus').textContent = '', 4000);
    }
};

        if (touchStartX === null || e.touches.length !== 1) return;
        const touch = e.touches[0];

        if (Math.abs(touchDeltaX) > 10) {

        }
        dom.calendarDays.style.transform = `translateX(${touchDeltaX}px)`;
    }, { passive: false });

        if (touchStartX === null) return;
        const touch = e.changedTouches[0];
        touchDeltaX = touch.clientX - touchStartX;
        const threshold = 60;

        if (Math.abs(touchDeltaX) < threshold) {
            resetCalendarTransform();
        } else {
            const direction = touchDeltaX < 0 ? 'left' : 'right';
            const slideDistance = direction === 'left' ? -window.innerWidth * 0.7 : window.innerWidth * 0.7;
            dom.calendarDays.style.transition = 'transform 0.25s ease';

const updateCountdown = () => {
    const expiryDateInput = dom.visaExpiryDate.value;
    if (!expiryDateInput) {
        resetCountdown();
        return;
    }

    const expiryDate = new Date(expiryDateInput);
    const today = new Date();
    today.setHours(0, 0, 0, 0); // 设置为当天开始时间

    const timeDiff = expiryDate.getTime() - today.getTime();
    const daysLeft = Math.ceil(timeDiff / (1000 * 3600 * 24));

    if (daysLeft < 0) {
        dom.daysLeft.textContent = '已过期';
        dom.statusText.textContent = '已过期';
        dom.statusText.style.color = '#DC143C';
        dom.progressText.textContent = '100%';
        dom.circularProgress.className = 'circular-progress progress-red';
        setProgress(100);
        return;
    }

    dom.daysLeft.textContent = daysLeft;
    dom.expiryDateText.textContent = expiryDate.toLocaleDateString('zh-CN');

    let status = '';
    let colorClass = '';
    let progress = 0;

    if (daysLeft > 90) {
        status = '安全';
        colorClass = 'progress-green';
        progress = Math.min(100, (daysLeft / 365) * 100); // 假设最长1年
    } else if (daysLeft >= 30) {
        status = '警告';
        colorClass = 'progress-yellow';
        progress = (daysLeft / 90) * 100;
    } else {
        status = '危险';
        colorClass = 'progress-red';
        progress = (daysLeft / 30) * 100;
    }

    dom.statusText.textContent = status;
    dom.statusText.style.color = colorClass === 'progress-green' ? '#228B22' : 
                                 colorClass === 'progress-yellow' ? '#FFA500' : '#DC143C';
    dom.progressText.textContent = Math.round(progress) + '%';
    dom.circularProgress.className = 'circular-progress ' + colorClass;
    setProgress(progress);
};

const setProgress = (percent) => {
    const circle = document.querySelector('.progress-bar');
    if (circle) {
        const radius = 90;
        const circumference = 2 * Math.PI * radius;
        const offset = circumference - (percent / 100) * circumference;
        circle.style.strokeDashoffset = offset;
    }
};

const resetCountdown = () => {
    dom.daysLeft.textContent = '--';
    dom.statusText.textContent = '请输入有效期';
    dom.statusText.style.color = 'var(--gray)';
    dom.expiryDateText.textContent = '--';
    dom.progressText.textContent = '--';
    dom.circularProgress.className = 'circular-progress';
    setProgress(0);
};

// 打牌记账功能
class PokerScoreManager {
    constructor() {
        this.rounds = JSON.parse(localStorage.getItem('pokerRounds')) || [];
        
        // 从localStorage恢复状态
        const savedState = localStorage.getItem('pokerState');
        if (savedState) {
            const state = JSON.parse(savedState);
            this.currentRound = state.currentRound || 1;
            this.isSettled = state.isSettled || false;
            this.settleStartRound = state.settleStartRound || 1;
        } else {
            // 如果没有保存的状态，根据已有的记录计算当前局数
            this.currentRound = this.rounds.length > 0 ? this.rounds[this.rounds.length - 1].number + 1 : 1;
            this.isSettled = false;
            this.settleStartRound = 1;
        }
        // 从localStorage恢复人名
const savedPlayerNames = localStorage.getItem('playerNames');
if (savedPlayerNames) {
    const playerNames = JSON.parse(savedPlayerNames);
    const players = ['A', 'B', 'C', 'D'];
    players.forEach(player => {
        const input = document.getElementById(`player${player}`);
        if (input && playerNames[player]) {
            input.value = playerNames[player];
        }
    });
}
        // 事件绑定状态跟踪
        this.eventsBound = false;
        this.modalEventsBound = false;
        
        this.init();
    }

    init() {
        this.bindEvents();
        this.updatePlayerLabels();
        this.renderRounds();
        this.calculateTotals();
        
        // 设置按钮状态
const settleBtn = document.getElementById('settleBtn');
settleBtn.textContent = '收盘';
settleBtn.classList.remove('settled');
        
        // 设置当前局数显示
        document.getElementById('roundNumber').textContent = this.currentRound;
    }

    bindEvents() {
        this.rebindEvents();
        this.bindModalEvents();
    }

    bindModalEvents() {
        // 打开玩家设置弹窗
        document.getElementById('playerSettingsBtn').addEventListener('click', () => {
            this.openPlayerSettings();
        });

        // 关闭弹窗
        document.getElementById('closePlayerSettings').addEventListener('click', () => {
            this.closePlayerSettings();
        });

        document.getElementById('cancelPlayerSettings').addEventListener('click', () => {
            this.closePlayerSettings();
        });

        document.getElementById('playerSettingsOverlay').addEventListener('click', () => {
            this.closePlayerSettings();
        });

        // 保存设置
        document.getElementById('savePlayerSettings').addEventListener('click', () => {
            this.savePlayerSettings();
        });



        document.getElementById('closeAllHistoryBtn').addEventListener('click', () => {
            this.closeAllHistory();
        });

        document.getElementById('allHistoryOverlay').addEventListener('click', () => {
            this.closeAllHistory();
        });

        // 收盘功能
document.getElementById('settleBtn').addEventListener('click', () => {
    this.confirmAndClear();
});


        // 刷新面板显示
        this.calculateTotals();
        this.renderRounds();
        this.clearForm();

    }

    openPlayerSettings() {
        document.getElementById('playerSettingsModal').classList.add('active');
        document.getElementById('playerSettingsOverlay').classList.add('active');
    }

    closePlayerSettings() {
        document.getElementById('playerSettingsModal').classList.remove('active');
        document.getElementById('playerSettingsOverlay').classList.remove('active');
    }

    savePlayerSettings() {
        this.updatePlayerLabels();
        this.closePlayerSettings();
    }

    openAllHistory() {
        this.renderAllRounds();
        document.getElementById('allHistoryModal').classList.add('active');
        document.getElementById('allHistoryOverlay').classList.add('active');
    }

    closeAllHistory() {
        document.getElementById('allHistoryModal').classList.remove('active');
        document.getElementById('allHistoryOverlay').classList.remove('active');
    }
    confirmAndClear() {
    if (confirm('需要结束这轮记分吗？')) {
        // 清空所有局数记录
        this.rounds = [];
        this.currentRound = 1;
        
        // 清空所有分数
        this.totals = { A: 0, B: 0, C: 0, D: 0 };
        
        // 重置人名为默认值
        const defaultNames = { A: '甲', B: '乙', C: '丙', D: '丁' };
        const players = ['A', 'B', 'C', 'D'];
        players.forEach(player => {
            const input = document.getElementById(`player${player}`);
            if (input) {
                input.value = defaultNames[player];
            }
        });
        
        // 清空localStorage中的玩家人名和状态
        localStorage.removeItem('playerNames');
        localStorage.removeItem('pokerState');
        
        // 保存空的 rounds 到 localStorage
        localStorage.setItem('pokerRounds', JSON.stringify(this.rounds));
        
        // 刷新显示
        this.updatePlayerLabels();
        this.calculateTotals();
        this.renderRounds();
        this.clearForm();
        
        // 确保局数按钮复位为第1局
        document.getElementById('roundNumber').textContent = '1';
        
        alert('数据已清零，人名已恢复默认值！');
    }
}
    renderAllRounds() {
        const allRoundsList = document.getElementById('allRoundsList');
        
        if (this.rounds.length === 0) {
            allRoundsList.innerHTML = '<div class="no-rounds">暂无记录</div>';
            return;
        }

        // 全部历史记录也采用倒序显示
        const allRoundsReversed = [...this.rounds].reverse();
        
        allRoundsList.innerHTML = allRoundsReversed.map(round => `
            <div class="all-history-row">
                <div class="all-history-round">第${round.number}局</div>
                ${this.getAllPlayerScoresTableHTML(round)}

            </div>
        `).join('');
    }

    getAllPlayerScoresTableHTML(round) {
        const players = ['A', 'B', 'C', 'D'];
        return players.map(player => {
            const score = round.scores[player];
            const scoreClass = score > 0 ? 'positive' : score < 0 ? 'negative' : '';
            
            return `<div class="all-history-score ${scoreClass}">${score > 0 ? '+' : ''}${score}</div>`;
        }).join('');
    }

    rebindEvents() {
        if (this.eventsBound) {
            return; // 如果事件已经绑定，直接返回
        }
        
        // 移除现有的事件监听器
        const playerInputs = document.querySelectorAll('.player-name');
        Array.from(playerInputs).forEach(input => {
            input.replaceWith(input.cloneNode(true));
        });
        
        const form = document.getElementById('addRoundForm');
        if (form) {
            form.replaceWith(form.cloneNode(true));
        }

        // 重新绑定玩家名称变更事件
        const newPlayerInputs = document.querySelectorAll('.player-name');
        Array.from(newPlayerInputs).forEach(input => {
            input.addEventListener('input', () => this.updatePlayerLabels());
        });

        // 重新绑定添加新局表单提交
        document.getElementById('addRoundForm').addEventListener('submit', (e) => {
            e.preventDefault();
            this.addRound();
        });
  
        this.eventsBound = true; // 标记事件已绑定
    }

    updatePlayerLabels() {
    const players = ['A', 'B', 'C', 'D'];
    const playerNames = {};
    
    players.forEach(player => {
        const name = document.getElementById(`player${player}`).value;
        playerNames[player] = name;
        document.getElementById(`display${player}`).textContent = name;
        document.getElementById(`scoreLabel${player}`).textContent = name;
    });
    
    // 保存人名到localStorage
    localStorage.setItem('playerNames', JSON.stringify(playerNames));
}

    addRound() {
        const scores = {};
        const players = ['A', 'B', 'C', 'D'];
        let isValid = true;

        // 获取分数并验证
        players.forEach(player => {
            const scoreInput = document.getElementById(`score${player}`);
            const score = parseInt(scoreInput.value) || 0;
            scores[player] = score;
            
            if (scoreInput.value === '') {
                scoreInput.style.borderColor = '#DC143C';
                isValid = false;
            } else {
                scoreInput.style.borderColor = '#DAA520';
            }
        });

        if (!isValid) {
            alert('请填写所有玩家的分数！');
            return;
        }

        // 验证分数总和是否为0
        const totalScore = Object.values(scores).reduce((sum, score) => sum + score, 0);
        if (totalScore !== 0) {
            alert(`分数总和必须为0，当前总和为：${totalScore}`);
            return;
        }

        // 添加新局
        const round = {
            number: this.currentRound,
            scores: scores,
            timestamp: new Date().toLocaleString()
        };

        this.rounds.push(round);
        this.currentRound++;
        this.saveToLocalStorage();
        this.renderRounds();
        this.calculateTotals();
        this.clearForm();
    }

    clearForm() {
        const players = ['A', 'B', 'C', 'D'];
        players.forEach(player => {
            document.getElementById(`score${player}`).value = '';
        });
        document.getElementById('roundNumber').textContent = this.currentRound;
    }

    deleteRound(roundNumber) {
        if (confirm('确定要删除这一局记录吗？')) {
            this.rounds = this.rounds.filter(round => round.number !== roundNumber);
            // 重新编号
            this.rounds.forEach((round, index) => {
                round.number = index + 1;
            });
            this.currentRound = this.rounds.length + 1;
            this.saveToLocalStorage();
            this.renderRounds();
            this.calculateTotals();
        }
    }

    calculateTotals() {
        const totals = { A: 0, B: 0, C: 0, D: 0 };
        
        this.rounds.forEach(round => {
            Object.keys(round.scores).forEach(player => {
                totals[player] += round.scores[player];
            });
        });

        // 更新显示
        Object.keys(totals).forEach(player => {
            const totalElement = document.getElementById(`total${player}`);
            totalElement.textContent = totals[player];
            totalElement.className = 'total-score-display ' + (totals[player] > 0 ? 'positive' : totals[player] < 0 ? 'negative' : '');
        });
    }

    renderRounds() {
        const roundsList = document.getElementById('roundsList');
        const historyFooter = document.getElementById('historyFooter');
        
        if (this.rounds.length === 0) {
            roundsList.innerHTML = '<div class="no-rounds">暂无记录</div>';
            historyFooter.style.display = 'none';
            return;
        }

        // 显示所有对局记录，倒序显示（最新的在最上面）
        const allRounds = [...this.rounds].reverse();
        
        roundsList.innerHTML = allRounds.map(round => `
            <div class="history-row">
                <div class="history-round">第${round.number}局</div>
                ${this.getPlayerScoresTableHTML(round)}
            </div>
        `).join('');
    }

    getPlayerScoresTableHTML(round) {
        const players = ['A', 'B', 'C', 'D'];
        return players.map(player => {
            const score = round.scores[player];
            const scoreClass = score > 0 ? 'positive' : score < 0 ? 'negative' : '';
            
            return `<div class="history-score ${scoreClass}">${score > 0 ? '+' : ''}${score}</div>`;
        }).join('');
    }

    getPlayerScoresHTML(round) {
        const players = ['A', 'B', 'C', 'D'];
        return players.map(player => {
            const score = round.scores[player];
            const playerName = document.getElementById(`player${player}`).value;
            const scoreClass = score > 0 ? 'positive' : score < 0 ? 'negative' : '';
            
            return `
                <div class="round-score-item">
                    <span class="round-score-label">${playerName}</span>
                    <span class="round-score-value ${scoreClass}">${score > 0 ? '+' : ''}${score}</span>
                </div>
            `;
        }).join('');
    }

    saveToLocalStorage() {
        localStorage.setItem('pokerRounds', JSON.stringify(this.rounds));
        this.saveState();
    }

    saveState() {
        const state = {
            currentRound: this.currentRound,
            isSettled: this.isSettled,
            settleStartRound: this.settleStartRound
        };
        localStorage.setItem('pokerState', JSON.stringify(state));
    }
}
